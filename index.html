<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Akshara Alchemist</title>
    <style>
        :root { --bg: #0f172a; --blue: #38bdf8; --gold: #fbbf24; --white: #f1f5f9; --green: #4ade80; }
        * { box-sizing: border-box; touch-action: none; } /* Prevents accidental scrolling while dragging */
        
        body { 
            height: 100vh; margin: 0; overflow: hidden; background: var(--bg); color: var(--white);
            font-family: sans-serif; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; padding: 10px; }
        header { text-align: center; height: 15%; }
        #goal-area { text-align: center; height: 15%; display: flex; flex-direction: column; justify-content: center; }
        #target-text { color: var(--gold); font-size: 2.5rem; font-weight: bold; }

        /* FIXED GRID FOR MOBILE */
        .game-grid { display: grid; grid-template-columns: 80px 1fr 80px; gap: 10px; height: 45%; align-items: center; }
        .bank { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--blue); border-radius: 10px;
            height: 100%; display: flex; flex-direction: column; align-items: center; padding: 5px; gap: 8px; overflow-y: auto;
        }
        .bank h3 { font-size: 0.6rem; margin: 2px; color: var(--blue); }

        .forge-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #forge-circle {
            width: 120px; height: 120px; border: 4px dashed var(--gold); border-radius: 50%;
            display: flex; justify-content: center; align-items: center; font-size: 3rem;
            background: rgba(251,191,36,0.05); transition: 0.2s;
        }

        .tile {
            width: 60px; height: 60px; background: white; color: #1e293b; border-radius: 8px;
            display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: bold;
            box-shadow: 0 4px 0 #94a3b8; flex-shrink: 0;
        }
        .tile.m { background: var(--gold); box-shadow: 0 4px 0 #b45309; }

        #tray-area { height: 25%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .tray { display: flex; gap: 5px; }
        .slot { width: 60px; height: 60px; border: 2px dashed #475569; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 1.5rem; }

        #msg { font-size: 0.9rem; color: var(--green); margin-top: 10px; height: 20px; text-align: center; }
        .hidden { display: none !important; }
        #next-btn { padding: 10px 20px; background: var(--green); border: none; border-radius: 20px; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2 style="margin:0; font-size: 1.2rem;">Akshara Alchemist</h2>
        <select id="lvl" onchange="start()" style="margin-top:5px; background:#1e293b; color:white; border:1px solid var(--blue); padding:3px;">
            <option value="1">Level 1: Fusion</option>
            <option value="2">Level 2: Words</option>
        </select>
    </header>

    <div id="goal-area">
        <div id="target-text">की</div>
    </div>

    <div class="game-grid">
        <div class="bank" id="v-bank"></div>
        <div class="forge-zone">
            <div id="forge-circle" ondragover="event.preventDefault()" ondrop="dropToForge(event)" data-v="" data-m="">?</div>
            <div id="msg">Drop a Vyanjan</div>
            <button id="next-btn" class="hidden" onclick="moveNext()">Next</button>
        </div>
        <div class="bank" id="m-bank"></div>
    </div>

    <div id="tray-area" class="hidden">
        <div class="tray" id="tray"></div>
    </div>
</div>

<script>
    const l1 = [
        {t:"की",v:["क","ल"],m:["ा","ी"]},
        {t:"पु",v:["प","म"],m:["ु","ू"]},
        {t:"मछली",v:["म","छ","ल"],m:["ी"]} // Level 2 logic will pull from here
    ];
    
    let idx = 0;

    function start() {
        idx = 0;
        load();
    }

    function load() {
        const lvl = document.getElementById('lvl').value;
        const data = l1[idx]; // Simplified for testing
        document.getElementById('target-text').innerText = data.t;
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('msg').innerText = "Drop a Vyanjan";
        
        // Reset Forge attributes
        const forge = document.getElementById('forge-circle');
        forge.dataset.v = ""; forge.dataset.m = "";
        forge.innerText = "?";
        forge.style.borderStyle = "dashed";

        // Render Banks
        const vb = document.getElementById('v-bank'); vb.innerHTML = "<h3>VYANJAN</h3>";
        data.v.forEach(v => vb.innerHTML += `<div class="tile" draggable="true" ondragstart="drag(event,'v','${v}')">${v}</div>`);
        
        const mb = document.getElementById('m-bank'); mb.innerHTML = "<h3>MATRA</h3>";
        data.m.forEach(m => mb.innerHTML += `<div class="tile m" draggable="true" ondragstart="drag(event,'m','${m}')">${m}</div>`);

        const trayArea = document.getElementById('tray-area');
        if(lvl == "2") {
            trayArea.classList.remove('hidden');
            const t = document.getElementById('tray'); t.innerHTML = "";
            // Logic to split word into slots...
            t.innerHTML = `<div class="slot" ondragover="event.preventDefault()" ondrop="dropToTray(event)">?</div>`;
        } else { trayArea.classList.add('hidden'); }
    }

    function drag(e, type, val) {
        e.dataTransfer.setData("type", type);
        e.dataTransfer.setData("val", val);
    }

    function dropToForge(e) {
        e.preventDefault();
        const forge = document.getElementById('forge-circle');
        const type = e.dataTransfer.getData("type");
        const val = e.dataTransfer.getData("val");

        if(type === 'v') {
            forge.dataset.v = val; // Store physically in the element
            forge.dataset.m = ""; 
            document.getElementById('msg').innerText = "Now add Matra";
        } else if(type === 'm' && forge.dataset.v !== "") {
            forge.dataset.m = val; // Store physically in the element
        }

        // Always reconstruct from physical storage
        forge.innerText = forge.dataset.v + forge.dataset.m;
        forge.style.borderStyle = "solid";

        // Check Victory Level 1
        if(document.getElementById('lvl').value == "1" && forge.innerText === document.getElementById('target-text').innerText) {
            victory();
        }
    }

    function victory() {
        document.getElementById('msg').innerText = "Shabash!";
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function moveNext() {
        idx++;
        if(idx >= l1.length) idx = 0;
        load();
    }

    start();
</script>
</body>
</html>
